name: TWSE Stock Crawler

on:
  schedule:
    # 1. 台北時間 10:17 執行 (UTC 02:17)
    - cron: '17 2 * * *'
    # 2. 台北時間 12:17 執行 (UTC 04:17)
    - cron: '17 4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # 增加權限設定，確保 GitHub Action 有權限回傳檔案更新
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # 修正點 A：加入執行原本的 main.py
      # 這是負責「新股公告」與「截止提醒」的程式，並會更新 last_stock_id.txt
      - name: Run TWSE Main Crawler
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
        run: python main.py

      # 修正點 B：執行高報酬預警程式
      - name: Run HiStock High Yield Filter
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          GROUP_ID: ${{ secrets.GROUP_ID }}
        run: python scrape_high_yield.py
            

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 確保 last_stock_id.txt 即使原本不存在也會被追蹤
          git add last_stock_id.txt
          git commit -m "Update last stock ID [skip ci]" || echo "No changes to commit"
          git push
